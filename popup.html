<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Auto-Dismiss</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <img class="logo" src="assets/icon-48.png" alt="">
        <div>
          <h1>Prompt Auto-Dismiss</h1>
          <p>For ChatGPT prompts</p>
        </div>
      </header>

      <label class="toggle-row">
        <span>
          <strong>Auto-dismiss</strong>
          <small>Click matching Got it prompts</small>
        </span>
        <input id="enabled" type="checkbox" role="switch">
      </label>

      <label class="field">
        <span>Match style</span>
        <select id="strictMatch">
          <option value="true">Strict</option>
          <option value="false">Flexible</option>
        </select>
      </label>

      <label class="field">
        <span>Minimum delay</span>
        <select id="cooldownMs">
          <option value="750">0.75 seconds</option>
          <option value="1500">1.5 seconds</option>
          <option value="3000">3 seconds</option>
          <option value="5000">5 seconds</option>
        </select>
      </label>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
